name: VolleyCoach
options:
  bundleIdPrefix: com.volleycoach
  deploymentTarget:
    iOS: "18.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"

targets:
  VolleyCoach:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: VolleyCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.volleycoach.app
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Add player and coach profile photos."
        INFOPLIST_KEY_NSCameraUsageDescription: "Take photos directly for player profiles."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save photos to your photo library."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
